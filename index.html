<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%); width:600px; height:600px; background:radial-gradient(circle,rgba(var(--accent-rgb),0.07) 0%,transparent 70%); pointer-events:none; z-index:0; }
    .topbar { position:fixed; top:14px; right:16px; z-index:100; display:flex; gap:8px; align-items:center; }
    .hero { position:relative; z-index:1; text-align:center; padding:56px 20px 40px; max-width:520px; width:100%; }
    .badge { display:inline-block; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.3); color:var(--accent); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; border-radius:100px; margin-bottom:20px; animation:fadeIn 0.5s ease both; }
    h1 { font-family:var(--heading-font); font-size:clamp(34px,7vw,50px); font-weight:800; line-height:1.05; letter-spacing:-2px; margin-bottom:10px; animation:fadeIn 0.5s 0.08s ease both; }
    h1 span { color:var(--accent); }
    .subtitle { color:var(--text-muted); font-size:13px; line-height:1.7; margin-bottom:28px; animation:fadeIn 0.5s 0.16s ease both; }

    /* System blocks */
    .sys-block { width:100%; max-width:480px; margin:0 auto 14px; animation:fadeIn 0.5s 0.2s ease both; }
    .sys-label-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:0 2px; }
    .sys-tag { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
    .sys-line { flex:1; height:1px; background:var(--border); }

    /* Main sys card */
    .sys-main { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 20px; text-decoration:none; color:inherit; display:flex; align-items:center; gap:14px; transition:all 0.2s; margin-bottom:8px; }
    .sys-main:hover { transform:translateX(3px); box-shadow:var(--shadow); border-color:rgba(var(--accent-rgb),0.3); }
    .sys-main-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .sys-main-icon.gold { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); }
    .sys-main-icon.teal { background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.2); }
    .sys-main-info { flex:1; text-align:left; }
    .sys-main-name { font-family:var(--heading-font); font-size:15px; font-weight:800; margin-bottom:2px; }
    .sys-main-desc { font-size:11px; color:var(--text-muted); }
    .sys-arrow { color:var(--text-muted); font-size:14px; transition:all 0.2s; }
    .sys-main:hover .sys-arrow { color:var(--accent); transform:translateX(3px); }

    /* Sub links */
    .sub-links { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .sub-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px; transition:all 0.2s; font-size:12px; font-weight:600; }
    .sub-card:hover { border-color:rgba(var(--accent-rgb),0.35); background:var(--surface); }
    .sub-card-lg { padding:14px; align-items:flex-start; flex-direction:row; gap:10px; }
    .sub-card-lg .sub-icon { font-size:20px; margin-top:1px; }
    .sub-name { font-size:13px; font-weight:700; font-family:var(--heading-font); margin-bottom:2px; }
    .sub-desc { font-size:10px; color:var(--text-muted); font-weight:400; line-height:1.4; }
    .sub-card-center { flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:12px 8px; gap:5px; font-size:11px; }
    .sub-card-center .sub-icon { font-size:18px; }

    /* Admin row */
    .admin-row { width:100%; max-width:480px; margin:0 auto; animation:fadeIn 0.5s 0.32s ease both; }
    .footer-note { position:relative; z-index:1; margin-top:24px; font-size:11px; color:var(--text-muted); opacity:0.4; animation:fadeIn 0.5s 0.4s ease both; }
  </style>
</head>
<body>
  <div class="topbar">
    <div id="themeSwitcher"></div>
    <div style="width:1px;height:16px;background:var(--border)"></div>
    <div id="langSwitcher" style="display:flex;gap:5px"></div>
  </div>

  <div class="hero">
    <div class="badge" id="txt-badge"></div>
    <h1 id="txt-h1"></h1>
    <p class="subtitle" id="txt-subtitle"></p>

    <!-- PARCEL SYSTEM -->
     <div class="sys-block" style="animation-delay:0.26s">
      <div class="sys-label-row">
        <div class="sys-line"></div>
        <span class="sys-tag" id="txt-sys-visitor-tag"></span>
        <div class="sys-line"></div>
      </div>
      <a href="dispatcher.html" class="sys-main">
        <div class="sys-main-icon teal">🚚</div>
        <div class="sys-main-info">
          <div class="sys-main-name" id="txt-sys-visitor"></div>
          <div class="sys-main-desc" id="txt-sys-visitor-desc"></div>
        </div>
        <span class="sys-arrow">→</span>
      </a>
    </div>

    <!-- VISITOR SYSTEM — single big card -->
    <div class="sys-block" style="animation-delay:0.2s">
      <div class="sys-label-row">
        <div class="sys-line"></div>
        <span class="sys-tag" id="txt-sys-parcel-tag"></span>
        <div class="sys-line"></div>
      </div>
      <div class="sub-links">
        <a href="visitor-register.html" class="sub-card sub-card-lg"><span class="sub-icon">🪪</span><div><div class="sub-name" id="txt-dispatcher"></div><div class="sub-desc" id="txt-dispatcher-desc"></div></div></a>
        <a href="visitor-check.html" class="sub-card sub-card-lg"><span class="sub-icon">🔍</span><div><div class="sub-name" id="txt-owner"></div><div class="sub-desc" id="txt-owner-desc"></div></div></a>
      </div>
    </div>

    <!-- UTILITY GRID — guard, owner, plan, admin, how, about, contact -->
    <div class="admin-row">
      <div class="sub-links" style="grid-template-columns:repeat(4,1fr)">
        <a href="guard.html" class="sub-card sub-card-center"><span class="sub-icon">🛡️</span><span id="txt-guard"></span></a>
        <a href="owner.html" class="sub-card sub-card-center"><span class="sub-icon">🏠</span><span id="txt-owner-util"></span></a>
        <a href="plan.html" class="sub-card sub-card-center"><span class="sub-icon">🚀</span><span id="txt-plan"></span></a>
        <a href="admin.html" class="sub-card sub-card-center"><span class="sub-icon">⚙️</span><span id="txt-admin"></span></a>
        <a href="how.html" class="sub-card sub-card-center"><span class="sub-icon">📖</span><span id="txt-how"></span></a>
        <a href="about.html" class="sub-card sub-card-center"><span class="sub-icon">✦</span><span id="txt-about"></span></a>
        <a href="contact.html" class="sub-card sub-card-center"><span class="sub-icon">💬</span><span id="txt-contact"></span></a>
        <a href="visitor-check.html" class="sub-card sub-card-center"><span class="sub-icon">🔍</span><span id="txt-vis-check-util"></span></a>
      </div>
    </div>
  </div>
  <p class="footer-note" id="txt-footer"></p>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script>
    renderLangSwitcher('langSwitcher')
    renderThemeSwitcher('themeSwitcher')
    document.getElementById('txt-badge').textContent = t('index_badge')
    document.getElementById('txt-h1').innerHTML = t('index_title1')+'<br><span>'+t('index_title2')+'</span>'
    document.getElementById('txt-subtitle').textContent = t('index_subtitle')
    document.getElementById('txt-sys-parcel-tag').textContent = t('sys_parcel')
    document.getElementById('txt-dispatcher').textContent = t('card_dispatcher')
    document.getElementById('txt-dispatcher-desc').textContent = t('card_dispatcher_desc')
    document.getElementById('txt-owner').textContent = t('card_owner')
    document.getElementById('txt-owner-desc').textContent = t('card_owner_desc')
    document.getElementById('txt-sys-visitor-tag').textContent = t('sys_visitor')
    document.getElementById('txt-sys-visitor').textContent = t('sys_visitor')
    document.getElementById('txt-sys-visitor-desc').textContent = t('sys_visitor_desc')
    document.getElementById('txt-guard').textContent = t('guard_title')
    document.getElementById('txt-owner-util').textContent = t('card_owner')
    document.getElementById('txt-plan').textContent = t('plan_short')
    document.getElementById('txt-admin').textContent = t('card_admin')
    document.getElementById('txt-how').textContent = t('card_how')
    document.getElementById('txt-about').textContent = t('card_about')
    document.getElementById('txt-contact').textContent = t('contact_title')
    document.getElementById('txt-vis-check-util').textContent = t('vis_check_title')
    document.getElementById('txt-how').textContent = t('card_how')
    document.getElementById('txt-about').textContent = t('card_about')
    document.getElementById('txt-contact').textContent = t('contact_title')
    document.getElementById('txt-footer').textContent = t('footer')
  </script>
</body>
</html>
