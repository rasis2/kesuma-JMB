<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Guna — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .acc-item { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; transition:border-color 0.2s; }
    .acc-item.open { border-color:rgba(var(--accent-rgb),0.35); }
    .acc-header { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; }
    .acc-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .acc-icon.gold   { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); }
    .acc-icon.teal   { background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.2); }
    .acc-icon.purple { background:rgba(159,122,234,0.1); border:1px solid rgba(159,122,234,0.2); }
    .acc-icon.blue   { background:rgba(99,179,237,0.1); border:1px solid rgba(99,179,237,0.2); }
    .acc-icon.red    { background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.2); }
    .acc-label { flex:1; }
    .acc-name { font-family:var(--heading-font); font-size:14px; font-weight:800; }
    .acc-role { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .acc-chevron { font-size:11px; color:var(--text-muted); transition:transform 0.25s; }
    .acc-item.open .acc-chevron { transform:rotate(180deg); }
    .acc-body { display:none; padding:0 16px 14px; }
    .acc-item.open .acc-body { display:block; }
    .step-list { list-style:none; padding:0; margin:0; }
    .step-item { display:flex; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
    .step-item:last-child { border-bottom:none; }
    .step-num { width:22px; height:22px; border-radius:50%; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); color:var(--accent); font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .step-text { flex:1; color:var(--text-muted); }
    .step-text strong { color:var(--text); font-weight:600; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">

    </div>

  </main>

    const lang = getLang()
    const c = content[lang] || content.ms
    document.getElementById('txt-title').textContent = c.title
    document.getElementById('txt-subtitle').textContent = c.subtitle

    const container = document.getElementById('accordionList')
    c.items.forEach(item => {
      const div = document.createElement('div')
      div.className = 'acc-item'
      div.innerHTML = `
        <div class="acc-header" onclick="toggle(this)">
          <div class="acc-icon ${item.color}">${item.icon}</div>
          <div class="acc-label">
            <div class="acc-name">${item.name}</div>
            <div class="acc-role">${item.role}</div>
          </div>
          <span class="acc-chevron">▼</span>
        </div>
        <div class="acc-body">
          <ul class="step-list">
            ${item.steps.map((s,j) => `<li class="step-item"><div class="step-num">${j+1}</div><div class="step-text">${s}</div></li>`).join('')}
          </ul>
        </div>`
      container.appendChild(div)
    })

    function toggle(header) {
      const item = header.closest('.acc-item')
      const wasOpen = item.classList.contains('open')
      document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('open'))
      if (!wasOpen) item.classList.add('open')
    }
  </script>
</body>
</html>
