<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Guna — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .acc-item { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; transition:border-color 0.2s; }
    .acc-item.open { border-color:rgba(var(--accent-rgb),0.35); }
    .acc-header { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; }
    .acc-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .acc-icon.gold  { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); }
    .acc-icon.teal  { background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.2); }
    .acc-icon.purple{ background:rgba(159,122,234,0.1); border:1px solid rgba(159,122,234,0.2); }
    .acc-icon.blue  { background:rgba(99,179,237,0.1); border:1px solid rgba(99,179,237,0.2); }
    .acc-icon.red   { background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.2); }
    .acc-label { flex:1 }
    .acc-name { font-family:var(--heading-font); font-size:14px; font-weight:800; }
    .acc-role { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .acc-chevron { font-size:11px; color:var(--text-muted); transition:transform 0.25s; }
    .acc-item.open .acc-chevron { transform:rotate(180deg); }
    .acc-body { display:none; padding:0 16px 14px; }
    .acc-item.open .acc-body { display:block; }
    .step-list { list-style:none; padding:0; margin:0; }
    .step-item { display:flex; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
    .step-item:last-child { border-bottom:none; }
    .step-num { width:22px; height:22px; border-radius:50%; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); color:var(--accent); font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .step-text { flex:1; color:var(--text-muted); }
    .step-text strong { color:var(--text); font-weight:600; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon gold">📖</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>
    <div id="accordionList" class="animate-in" style="animation-delay:0.05s"></div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav('card_how')
    document.getElementById('txt-title').textContent = t('how_title')
    document.getElementById('txt-subtitle').textContent = t('how_subtitle')

    const items = {
      ms: [
        { icon:'🚚', color:'gold',   name:'Dispatcher',        role:'Kakitangan penerimaan / penghantar',
          steps:['<strong>Login</strong> dengan PIN Dispatcher (5555)','<strong>Pilih tingkat</strong> kemudian pilih nombor unit yang betul','<strong>Ambil gambar</strong> parsel dan pilih kurier','Tekan <strong>Daftar Parsel</strong> — rekod disimpan, pemilik boleh semak'] },
        { icon:'🏠', color:'teal',   name:'Pemilik (Parsel)',  role:'Pemilik unit — semak & tandakan selesai',
          steps:['Buka halaman <strong>Pemilik</strong>','Masukkan <strong>Unit + Emel ATAU Telefon</strong> untuk verify','Tengok tab <strong>Parsel</strong> — semak senarai parsel','Klik <strong>Selesai</strong> bila dah ambil parsel'] },
        { icon:'📝', color:'blue',   name:'Daftar Pelawat',    role:'Pelawat dari luar yang nak masuk',
          steps:['Buka halaman <strong>Daftar Lawatan</strong>','Isi nama, no. IC, telefon, unit yang nak dilawati, dan tujuan','Tekan <strong>Daftar Sekarang</strong> — dapat <strong>Kod Rujukan + QR Code</strong>','<strong>Salin atau download</strong> QR, tunjuk kepada guard masa tiba'] },
        { icon:'🏠', color:'teal',   name:'Pemilik (Pelawat)', role:'Pemilik unit — lulus atau tolak pelawat',
          steps:['Login ke halaman <strong>Pemilik</strong>','Pergi tab <strong>Pelawat</strong>','Semak senarai pelawat yang ada status <strong>Menunggu</strong>','Klik <strong>Lulus</strong> atau <strong>Tolak</strong> ikut budi bicara'] },
        { icon:'🛡️', color:'purple', name:'Security / Guard',  role:'Keselamatan di pintu masuk',
          steps:['Login ke halaman <strong>Security</strong> dengan PIN (9999)','Lihat senarai pelawat yang status <strong>Diluluskan</strong>','Bila pelawat tiba dan tunjuk QR atau kod, klik <strong>Check In</strong>','Bila pelawat keluar, cari rekod dan klik <strong>Check Out</strong>'] },
        { icon:'⚙️', color:'red',    name:'Admin',             role:'Pengurus JMB — akses penuh',
          steps:['Login dengan PIN Admin (1234)','Tab <strong>Parsel</strong> — semak semua unit, edit emel/telefon pemilik, pantau parsel tertunggak','Tab <strong>Pelawat</strong> — tengok semua rekod lawatan, filter by status, boleh lulus/tolak','Guna carian dan filter untuk cari unit atau pelawat tertentu'] },
        { icon:'🔍', color:'blue',   name:'Semak Status Lawatan', role:'Pelawat yang dah daftar',
          steps:['Buka halaman <strong>Semak Status</strong>','Masukkan <strong>Kod Rujukan</strong> yang diterima masa daftar (contoh: KES4X7MNP)','Tengok status semasa — Menunggu, Diluluskan, Ditolak, atau Telah Masuk','Kalau diluluskan, tunjuk QR code kepada guard'] },
      ],
      en: [
        { icon:'🚚', color:'gold',   name:'Dispatcher',        role:'Reception staff / courier',
          steps:['<strong>Login</strong> with Dispatcher PIN (5555)','<strong>Select floor</strong> then the correct unit number','<strong>Take a photo</strong> of the parcel and select courier','Press <strong>Register Parcel</strong> — record saved, owner can check'] },
        { icon:'🏠', color:'teal',   name:'Owner (Parcels)',   role:'Unit owner — check & mark done',
          steps:['Open the <strong>Owner</strong> page','Enter <strong>Unit + Email OR Phone</strong> to verify','Check the <strong>Parcel</strong> tab — view parcel list','Click <strong>Done</strong> once you have collected the parcel'] },
        { icon:'📝', color:'blue',   name:'Register Visit',    role:'Outside visitor wanting to enter',
          steps:['Open the <strong>Register Visit</strong> page','Fill in name, IC number, phone, unit to visit, and purpose','Press <strong>Register Now</strong> — receive <strong>Reference Code + QR Code</strong>','<strong>Copy or download</strong> the QR, show to guard on arrival'] },
        { icon:'🏠', color:'teal',   name:'Owner (Visitors)',  role:'Unit owner — approve or reject visitors',
          steps:['Login to the <strong>Owner</strong> page','Go to the <strong>Visitor</strong> tab','Check visitors with <strong>Pending</strong> status','Click <strong>Approve</strong> or <strong>Reject</strong> accordingly'] },
        { icon:'🛡️', color:'purple', name:'Security / Guard',  role:'Security at the entrance',
          steps:['Login to <strong>Security</strong> page with PIN (9999)','View visitors with <strong>Approved</strong> status','When visitor arrives and shows QR or code, click <strong>Check In</strong>','When visitor leaves, find the record and click <strong>Check Out</strong>'] },
        { icon:'⚙️', color:'red',    name:'Admin',             role:'JMB manager — full access',
          steps:['Login with Admin PIN (1234)','<strong>Parcel</strong> tab — view all units, edit owner contacts, monitor overdue parcels','<strong>Visitor</strong> tab — view all visit records, filter by status, approve/reject','Use search and filter to find specific units or visitors'] },
        { icon:'🔍', color:'blue',   name:'Check Visit Status', role:'Visitors who have registered',
          steps:['Open the <strong>Check Status</strong> page','Enter the <strong>Reference Code</strong> received during registration (e.g. KES4X7MNP)','View current status — Pending, Approved, Rejected, or Checked In','If approved, show QR code to guard'] },
      ]
    }

    const lang = getLang()
    const list = items[lang] || items.en

    const container = document.getElementById('accordionList')
    list.forEach((item, i) => {
      const div = document.createElement('div')
      div.className = 'acc-item'
      div.innerHTML = `
        <div class="acc-header" onclick="toggle(this)">
          <div class="acc-icon ${item.color}">${item.icon}</div>
          <div class="acc-label">
            <div class="acc-name">${item.name}</div>
            <div class="acc-role">${item.role}</div>
          </div>
          <span class="acc-chevron">▼</span>
        </div>
        <div class="acc-body">
          <ul class="step-list">
            ${item.steps.map((s,j) => `<li class="step-item"><div class="step-num">${j+1}</div><div class="step-text">${s}</div></li>`).join('')}
          </ul>
        </div>`
      container.appendChild(div)
    })

    function toggle(header) {
      const item = header.closest('.acc-item')
      const wasOpen = item.classList.contains('open')
      document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('open'))
      if (!wasOpen) item.classList.add('open')
    }
  </script>
</body>
</html>
