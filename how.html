<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Guna — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cat-header { display:flex; align-items:center; gap:12px; margin:28px 0 16px; }
    .cat-icon { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .cat-icon.gold { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); }
    .cat-icon.teal { background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.2); }
    .cat-icon.red { background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.2); }
    .cat-title { font-family:var(--heading-font); font-size:18px; font-weight:800; letter-spacing:-0.4px; }
    .cat-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .divider { height:1px; background:var(--border); margin:8px 0 20px; }
    .role-block { margin-bottom:20px; }
    .role-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .role-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .role-icon.gold { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); }
    .role-icon.green { background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.2); }
    .role-icon.purple { background:rgba(159,122,234,0.1); border:1px solid rgba(159,122,234,0.2); }
    .role-icon.blue { background:rgba(99,179,237,0.1); border:1px solid rgba(99,179,237,0.2); }
    .role-icon.red { background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.2); }
    .role-name { font-family:var(--heading-font); font-size:14px; font-weight:800; }
    .role-tag { font-size:11px; color:var(--text-muted); }
    .step-list { list-style:none; padding:0; }
    .step-item { display:flex; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
    .step-item:last-child { border-bottom:none; }
    .step-num { width:22px; height:22px; border-radius:50%; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); color:var(--accent); font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .step-text { flex:1; color:var(--text-muted); }
    .step-text strong { color:var(--text); font-weight:600; }
    .flow-arrow { text-align:center; font-size:12px; color:var(--text-muted); padding:6px 0; opacity:0.6; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon gold">📖</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>

    <!-- ═══ PARCEL SYSTEM ═══ -->
    <div class="animate-in" style="animation-delay:0.05s">
      <div class="cat-header">
        <div class="cat-icon gold">📦</div>
        <div>
          <div class="cat-title" id="txt-cat-parcel"></div>
          <div class="cat-sub" id="txt-cat-parcel-sub"></div>
        </div>
      </div>
      <div class="divider"></div>

      <!-- Dispatcher -->
      <div class="section role-block animate-in" style="animation-delay:0.08s">
        <div class="role-header">
          <div class="role-icon gold">🚚</div>
          <div>
            <div class="role-name" id="txt-role-disp"></div>
            <div class="role-tag" id="txt-role-disp-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-disp"></ul>
      </div>

      <!-- Owner (Parcel) -->
      <div class="section role-block animate-in" style="animation-delay:0.11s">
        <div class="role-header">
          <div class="role-icon green">🏠</div>
          <div>
            <div class="role-name" id="txt-role-owner"></div>
            <div class="role-tag" id="txt-role-owner-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-owner"></ul>
      </div>
    </div>

    <!-- ═══ VISITOR SYSTEM ═══ -->
    <div class="animate-in" style="animation-delay:0.14s">
      <div class="cat-header">
        <div class="cat-icon teal">🪪</div>
        <div>
          <div class="cat-title" id="txt-cat-visitor"></div>
          <div class="cat-sub" id="txt-cat-visitor-sub"></div>
        </div>
      </div>
      <div class="divider"></div>

      <!-- Visitor -->
      <div class="section role-block animate-in" style="animation-delay:0.17s">
        <div class="role-header">
          <div class="role-icon blue">🪪</div>
          <div>
            <div class="role-name" id="txt-role-vis"></div>
            <div class="role-tag" id="txt-role-vis-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-vis"></ul>
      </div>

      <!-- Owner (Visitor Approve) -->
      <div class="section role-block animate-in" style="animation-delay:0.2s">
        <div class="role-header">
          <div class="role-icon green">🏠</div>
          <div>
            <div class="role-name" id="txt-role-owner2"></div>
            <div class="role-tag" id="txt-role-owner2-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-owner2"></ul>
      </div>

      <!-- Guard -->
      <div class="section role-block animate-in" style="animation-delay:0.23s">
        <div class="role-header">
          <div class="role-icon purple">🛡️</div>
          <div>
            <div class="role-name" id="txt-role-guard"></div>
            <div class="role-tag" id="txt-role-guard-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-guard"></ul>
      </div>
    </div>

    <!-- ═══ ADMIN ═══ -->
    <div class="animate-in" style="animation-delay:0.26s">
      <div class="cat-header">
        <div class="cat-icon red">⚙️</div>
        <div>
          <div class="cat-title" id="txt-cat-admin"></div>
          <div class="cat-sub" id="txt-cat-admin-sub"></div>
        </div>
      </div>
      <div class="divider"></div>

      <div class="section role-block animate-in" style="animation-delay:0.29s">
        <div class="role-header">
          <div class="role-icon red">⚙️</div>
          <div>
            <div class="role-name" id="txt-role-admin"></div>
            <div class="role-tag" id="txt-role-admin-tag"></div>
          </div>
        </div>
        <ul class="step-list" id="steps-admin"></ul>
      </div>
    </div>

  </main>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav('card_how')
    document.getElementById('txt-title').textContent = t('how_title')
    document.getElementById('txt-subtitle').textContent = t('how_subtitle')

    document.getElementById('txt-cat-parcel').textContent = t('sys_parcel')
    document.getElementById('txt-cat-parcel-sub').textContent = t('how_cat_parcel_sub')
    document.getElementById('txt-cat-visitor').textContent = t('sys_visitor')
    document.getElementById('txt-cat-visitor-sub').textContent = t('how_cat_visitor_sub')
    document.getElementById('txt-cat-admin').textContent = t('card_admin')
    document.getElementById('txt-cat-admin-sub').textContent = t('how_cat_admin_sub')

    document.getElementById('txt-role-disp').textContent = t('card_dispatcher')
    document.getElementById('txt-role-disp-tag').textContent = t('how_role_disp_tag')
    document.getElementById('txt-role-owner').textContent = t('card_owner')
    document.getElementById('txt-role-owner-tag').textContent = t('how_role_owner_tag')
    document.getElementById('txt-role-vis').textContent = t('vis_register_title')
    document.getElementById('txt-role-vis-tag').textContent = t('how_role_vis_tag')
    document.getElementById('txt-role-owner2').textContent = t('card_owner')
    document.getElementById('txt-role-owner2-tag').textContent = t('how_role_owner2_tag')
    document.getElementById('txt-role-guard').textContent = t('guard_title')
    document.getElementById('txt-role-guard-tag').textContent = t('how_role_guard_tag')
    document.getElementById('txt-role-admin').textContent = t('card_admin')
    document.getElementById('txt-role-admin-tag').textContent = t('how_role_admin_tag')

    function renderSteps(elId, steps) {
      document.getElementById(elId).innerHTML = steps.map((s,i) =>
        `<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`
      ).join('')
    }

    renderSteps('steps-disp', t('how_steps_disp'))
    renderSteps('steps-owner', t('how_steps_owner'))
    renderSteps('steps-vis', t('how_steps_vis'))
    renderSteps('steps-owner2', t('how_steps_owner2'))
    renderSteps('steps-guard', t('how_steps_guard'))
    renderSteps('steps-admin', t('how_steps_admin'))
  </script>
</body>
</html>
