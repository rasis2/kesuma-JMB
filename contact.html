<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Support — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .faq-item { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; transition:border-color 0.2s; }
    .faq-item.open { border-color:rgba(var(--accent-rgb),0.35); }
    .faq-q { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; font-size:13px; font-weight:600; line-height:1.5; }
    .faq-chevron { font-size:11px; color:var(--text-muted); flex-shrink:0; transition:transform 0.25s; }
    .faq-item.open .faq-chevron { transform:rotate(180deg); }
    .faq-a { display:none; padding:0 16px 14px; font-size:13px; color:var(--text-muted); line-height:1.7; border-top:1px solid var(--border); padding-top:12px; }
    .faq-item.open .faq-a { display:block; }
    .new-badge { display:inline-block; background:rgba(76,175,125,0.15); color:var(--green); border:1px solid rgba(76,175,125,0.25); font-size:9px; font-weight:700; padding:1px 6px; border-radius:100px; letter-spacing:0.5px; margin-left:6px; vertical-align:middle; }
    .cat-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin:20px 0 8px 2px; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon gold">💬</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>

    <div class="section animate-in" style="animation-delay:0.05s">
      <div class="section-title" id="txt-contact-title"></div>
      <a href="https://wa.me/60145269960" target="_blank" style="display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;border-radius:12px;padding:14px 20px;text-decoration:none;font-weight:700;font-size:14px;justify-content:center;transition:opacity 0.2s" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
        <span style="font-size:20px">📲</span><span id="txt-wa-btn"></span>
      </a>
      <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:10px" id="txt-wa-note"></p>
    </div>

    <div class="animate-in" style="animation-delay:0.08s">
      <div id="faqContainer"></div>
    </div>

  </main>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav('contact_title')
    document.getElementById('txt-title').textContent = t('contact_title')
    document.getElementById('txt-subtitle').textContent = t('contact_subtitle')
    document.getElementById('txt-contact-title').textContent = 'HUBUNGI KAMI'
    document.getElementById('txt-wa-btn').textContent = 'WhatsApp +60 14-526 9960'
    document.getElementById('txt-wa-note').textContent = t('contact_wa_note')

    const faqs = {
      ms: [
        { cat: 'SISTEM PARSEL', items: [
          { q: 'Saya tak dapat log masuk sebagai pemilik unit.', a: 'Pastikan nombor unit betul (contoh: 10-5). Kemudian masukkan emel ATAU nombor telefon yang berdaftar. Jika masalah berterusan, hubungi admin untuk semak maklumat unit anda.' },
          { q: 'Gambar parsel tak boleh upload.', a: 'Pastikan kamera dibenarkan akses di browser. Cuba reload halaman dan cuba lagi. Saiz gambar yang disyorkan adalah bawah 5MB.' },
          { q: 'Parsel saya dah diambil tapi status masih Pending.', a: 'Log masuk sebagai pemilik dan klik butang "Selesai" pada parsel berkenaan untuk update status kepada Done.' },
        ]},
        { cat: 'SISTEM PELAWAT', items: [
          { q: 'Saya dah daftar pelawat tapi dia tak dapat masuk.', a: 'Kemungkinan besar pemilik unit belum meluluskan permohonan. Pemilik perlu log masuk di halaman Pemilik → tab Pelawat → Lulus. Pelawat boleh semak status di halaman Semak Status menggunakan kod rujukan.', isNew: true },
          { q: 'Guard cakap pelawat saya kena "Approved" dulu sebelum boleh Check In.', a: 'Ya, ini adalah proses yang betul. Pemilik unit perlu meluluskan pelawat terlebih dahulu melalui web. Selepas diluluskan, guard boleh klik Check In bila pelawat tiba.', isNew: true },
          { q: 'Saya tak dapat QR code masa daftar pelawat.', a: 'QR code dijana secara automatik selepas daftar berjaya. Pastikan JavaScript tidak disekat oleh browser anda. Cuba gunakan Chrome atau Safari terkini.' },
          { q: 'Boleh saya minta semula QR code yang dah hilang?', a: 'Pergi ke halaman Semak Status dan masukkan kod rujukan anda (contoh: KES4X7MNP). Kod rujukan boleh digunakan sebagai alternatif kepada QR code.', isNew: true },
        ]},
        { cat: 'ADMIN & KESELAMATAN', items: [
          { q: 'Apakah PIN untuk setiap peranan?', a: 'Dispatcher: 5555 | Security/Guard: 9999 | Admin: 1234. PIN ini boleh ditukar oleh pentadbir sistem pada masa akan datang.' },
          { q: 'Admin boleh akses sistem parsel DAN pelawat?', a: 'Ya! Admin dashboard kini mempunyai dua tab — Parsel dan Pelawat. Admin boleh pantau dan urus kedua-dua sistem dari satu tempat.', isNew: true },
          { q: 'Boleh saya tukar emel atau telefon pemilik unit?', a: 'Ya, log masuk sebagai Admin → cari unit → edit medan emel atau telefon → klik Simpan.' },
        ]},
        { cat: 'TEKNIKAL & UMUM', items: [
          { q: 'Sistem ni selamat ke? Data disimpan di mana?', a: 'Data disimpan di Supabase (PostgreSQL) yang dihost di Singapore. Supabase menggunakan Row Level Security (RLS) untuk kawalan akses. Tiada data sensitif seperti kata laluan disimpan.' },
          { q: 'Boleh guna di handphone?', a: 'Ya, sistem ini fully responsive dan dioptimumkan untuk mobile. Boleh juga tambah ke home screen sebagai PWA (Progressive Web App) untuk akses lebih cepat.' },
          { q: 'Sistem ni free ke?', a: 'Ya, 100% percuma untuk penghuni Kesuma. Dihost di Netlify (free tier) dengan Supabase sebagai backend. Tiada kos langganan.' },
        ]},
      ],
      en: [
        { cat: 'PARCEL SYSTEM', items: [
          { q: "I can't log in as a unit owner.", a: 'Make sure the unit number is correct (e.g. 10-5). Then enter the email OR phone number registered with your unit. If the problem persists, contact the admin to check your unit details.' },
          { q: "The parcel photo won't upload.", a: 'Make sure camera access is allowed in your browser. Try reloading the page and try again. Recommended image size is under 5MB.' },
          { q: "My parcel has been collected but the status is still Pending.", a: 'Log in as owner and click the "Done" button on the relevant parcel to update the status to Done.' },
        ]},
        { cat: 'VISITOR SYSTEM', items: [
          { q: "I registered a visitor but they can't enter.", a: "The unit owner most likely hasn't approved the request yet. The owner needs to log in at the Owner page → Visitor tab → Approve. Visitors can check their status on the Check Status page using their reference code.", isNew: true },
          { q: 'Guard says visitor needs "Approved" status before Check In.', a: 'Yes, this is the correct process. The unit owner must approve the visitor first through the web. Once approved, the guard can click Check In when the visitor arrives.', isNew: true },
          { q: "I didn't receive a QR code after registering.", a: 'The QR code is generated automatically after successful registration. Make sure JavaScript is not blocked by your browser. Try using the latest Chrome or Safari.' },
          { q: 'Can I get my QR code again if I lost it?', a: 'Go to the Check Status page and enter your reference code (e.g. KES4X7MNP). The reference code can be used as an alternative to the QR code.', isNew: true },
        ]},
        { cat: 'ADMIN & SECURITY', items: [
          { q: "What are the PINs for each role?", a: 'Dispatcher: 5555 | Security/Guard: 9999 | Admin: 1234. These PINs can be changed by the system administrator in the future.' },
          { q: 'Can admin access BOTH parcel and visitor systems?', a: 'Yes! The admin dashboard now has two tabs — Parcel and Visitor. Admins can monitor and manage both systems from one place.', isNew: true },
          { q: "Can I change a unit owner's email or phone?", a: "Yes, log in as Admin → find the unit → edit the email or phone field → click Save." },
        ]},
        { cat: 'TECHNICAL & GENERAL', items: [
          { q: 'Is the system secure? Where is data stored?', a: 'Data is stored in Supabase (PostgreSQL) hosted in Singapore. Supabase uses Row Level Security (RLS) for access control. No sensitive data like passwords is stored.' },
          { q: 'Can I use it on my phone?', a: 'Yes, the system is fully responsive and optimised for mobile. You can also add it to your home screen as a PWA (Progressive Web App) for quicker access.' },
          { q: 'Is this system free?', a: 'Yes, 100% free for Kesuma residents. Hosted on Netlify (free tier) with Supabase as the backend. No subscription costs.' },
        ]},
      ]
    }

    const lang = getLang()
    const faqList = faqs[lang] || faqs.en
    const container = document.getElementById('faqContainer')

    faqList.forEach(group => {
      const catDiv = document.createElement('div')
      catDiv.className = 'cat-label'
      catDiv.textContent = group.cat
      container.appendChild(catDiv)

      group.items.forEach(faq => {
        const div = document.createElement('div')
        div.className = 'faq-item'
        div.innerHTML = `
          <div class="faq-q" onclick="toggleFaq(this)">
            <span>${faq.q}${faq.isNew ? '<span class="new-badge">NEW</span>' : ''}</span>
            <span class="faq-chevron">▼</span>
          </div>
          <div class="faq-a">${faq.a}</div>`
        container.appendChild(div)
      })
    })

    function toggleFaq(el) {
      const item = el.closest('.faq-item')
      const wasOpen = item.classList.contains('open')
      document.querySelectorAll('.faq-item').forEach(f => f.classList.remove('open'))
      if (!wasOpen) item.classList.add('open')
    }
  </script>
</body>
</html>
