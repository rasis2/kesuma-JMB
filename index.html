<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%); width:600px; height:600px; background:radial-gradient(circle,rgba(var(--accent-rgb),0.07) 0%,transparent 70%); pointer-events:none; z-index:0; }
    .topbar { position:fixed; top:14px; right:16px; z-index:100; display:flex; gap:8px; align-items:center; }
    .hero { position:relative; z-index:1; text-align:center; padding:56px 20px 20px; max-width:560px; width:100%; }
    .badge { display:inline-block; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.3); color:var(--accent); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; border-radius:100px; margin-bottom:20px; animation:fadeIn 0.5s ease both; }
    h1 { font-family:var(--heading-font); font-size:clamp(36px,7vw,54px); font-weight:800; line-height:1.05; letter-spacing:-2px; margin-bottom:12px; animation:fadeIn 0.5s 0.08s ease both; }
    h1 span { color:var(--accent); }
    .subtitle { color:var(--text-muted); font-size:14px; line-height:1.7; margin-bottom:32px; animation:fadeIn 0.5s 0.16s ease both; }

    /* BIG SYSTEM CARDS */
    .systems { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:480px; margin:0 auto 20px; animation:fadeIn 0.5s 0.2s ease both; }
    .sys-card { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px 20px 22px; text-align:center; text-decoration:none; color:inherit; display:block; transition:all 0.2s; overflow:hidden; }
    .sys-card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.3s; border-radius:inherit; }
    .sys-card-parcel::before { background:radial-gradient(circle at 50% 0%,rgba(var(--accent-rgb),0.15),transparent 70%); }
    .sys-card-visitor::before { background:radial-gradient(circle at 50% 0%,rgba(76,175,125,0.12),transparent 70%); }
    .sys-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); border-color:rgba(var(--accent-rgb),0.4); }
    .sys-card:hover::before { opacity:1; }
    .sys-icon { font-size:36px; margin-bottom:12px; display:block; }
    .sys-label { font-family:var(--heading-font); font-size:17px; font-weight:800; margin-bottom:5px; letter-spacing:-0.3px; }
    .sys-desc { font-size:11px; color:var(--text-muted); line-height:1.5; }
    .sys-arrow { position:absolute; top:16px; right:16px; color:var(--text-muted); font-size:13px; transition:all 0.2s; }
    .sys-card:hover .sys-arrow { color:var(--accent); transform:translate(2px,-2px); }

    /* SMALL LINKS */
    .small-links { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; max-width:480px; margin:0 auto; animation:fadeIn 0.5s 0.28s ease both; }
    .sm-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 10px; text-align:center; text-decoration:none; color:inherit; display:block; transition:all 0.2s; }
    .sm-card:hover { border-color:rgba(var(--accent-rgb),0.4); transform:translateY(-1px); }
    .sm-icon { font-size:18px; margin-bottom:4px; display:block; }
    .sm-label { font-size:11px; font-weight:600; color:var(--text-muted); }
    .footer-note { position:relative; z-index:1; margin-top:28px; font-size:11px; color:var(--text-muted); opacity:0.4; animation:fadeIn 0.5s 0.4s ease both; }
  </style>
</head>
<body>
  <div class="topbar">
    <div id="themeSwitcher"></div>
    <div style="width:1px;height:16px;background:var(--border)"></div>
    <div id="langSwitcher" style="display:flex;gap:5px"></div>
  </div>

  <div class="hero">
    <div class="badge" id="txt-badge"></div>
    <h1 id="txt-h1"></h1>
    <p class="subtitle" id="txt-subtitle"></p>

    <!-- 2 main systems -->
    <div class="systems">
      <a href="parcel.html" class="sys-card sys-card-parcel">
        <span class="sys-icon">📦</span>
        <div class="sys-label" id="txt-sys-parcel"></div>
        <div class="sys-desc" id="txt-sys-parcel-desc"></div>
        <span class="sys-arrow">↗</span>
      </a>
      <a href="visitor.html" class="sys-card sys-card-visitor">
        <span class="sys-icon">🪪</span>
        <div class="sys-label" id="txt-sys-visitor"></div>
        <div class="sys-desc" id="txt-sys-visitor-desc"></div>
        <span class="sys-arrow">↗</span>
      </a>
    </div>

    <!-- small utility links -->
    <div class="small-links">
      <a href="about.html" class="sm-card"><span class="sm-icon">✦</span><div class="sm-label" id="txt-about"></div></a>
      <a href="how.html" class="sm-card"><span class="sm-icon">📖</span><div class="sm-label" id="txt-how"></div></a>
      <a href="contact.html" class="sm-card"><span class="sm-icon">💬</span><div class="sm-label" id="txt-contact"></div></a>
      <a href="plan.html" class="sm-card"><span class="sm-icon">🚀</span><div class="sm-label" id="txt-plan"></div></a>
      <a href="admin.html" class="sm-card"><span class="sm-icon">⚙️</span><div class="sm-label" id="txt-admin"></div></a>
      <a href="guard.html" class="sm-card"><span class="sm-icon">🛡️</span><div class="sm-label" id="txt-guard"></div></a>
    </div>
  </div>
  <p class="footer-note" id="txt-footer"></p>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script>
    renderLangSwitcher('langSwitcher')
    renderThemeSwitcher('themeSwitcher')
    document.getElementById('txt-badge').textContent = t('index_badge')
    document.getElementById('txt-h1').innerHTML = t('index_title1')+'<br><span>'+t('index_title2')+'</span>'
    document.getElementById('txt-subtitle').textContent = t('index_subtitle')
    document.getElementById('txt-sys-parcel').textContent = t('sys_parcel')
    document.getElementById('txt-sys-parcel-desc').textContent = t('sys_parcel_desc')
    document.getElementById('txt-sys-visitor').textContent = t('sys_visitor')
    document.getElementById('txt-sys-visitor-desc').textContent = t('sys_visitor_desc')
    document.getElementById('txt-about').textContent = t('card_about')
    document.getElementById('txt-how').textContent = t('card_how')
    document.getElementById('txt-contact').textContent = t('contact_title')
    document.getElementById('txt-plan').textContent = t('plan_short')
    document.getElementById('txt-admin').textContent = t('card_admin')
    document.getElementById('txt-guard').textContent = t('guard_title')
    document.getElementById('txt-footer').textContent = t('footer')
  </script>
</body>
</html>
