<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Support — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .wa-btn { display:flex; align-items:center; justify-content:center; width:52px; height:52px; background:#25D366; border-radius:50%; text-decoration:none; font-size:26px; transition:opacity 0.2s; margin:0 auto; }
    .wa-btn:hover { opacity:0.85; }
    .faq-item { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; transition:border-color 0.2s; }
    .faq-item.open { border-color:rgba(var(--accent-rgb),0.35); }
    .faq-q { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; font-size:13px; font-weight:600; line-height:1.5; }
    .faq-chevron { font-size:11px; color:var(--text-muted); flex-shrink:0; transition:transform 0.25s; }
    .faq-item.open .faq-chevron { transform:rotate(180deg); }
    .faq-a { display:none; padding:12px 16px 14px; font-size:13px; color:var(--text-muted); line-height:1.7; border-top:1px solid var(--border); }
    .faq-item.open .faq-a { display:block; }
    .new-badge { display:inline-block; background:rgba(76,175,125,0.15); color:var(--green); border:1px solid rgba(76,175,125,0.25); font-size:9px; font-weight:700; padding:1px 6px; border-radius:100px; letter-spacing:0.5px; margin-left:6px; vertical-align:middle; }
    .cat-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin:20px 0 8px 2px; }
    .cat-label:first-child { margin-top:0; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon gold">💬</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>
    <div class="section animate-in" style="animation-delay:0.05s;text-align:center">
      <div class="section-title" id="txt-contact-title"></div>
      <a href="https://wa.me/60145269960" target="_blank" class="wa-btn">📲</a>
    </div>
    <div class="animate-in" style="animation-delay:0.08s">
      <div id="faqContainer"></div>
    </div>
  </main>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script>

            { q: 'Gambar parsel tak boleh upload.', a: 'Pastikan kamera dibenarkan akses di browser. Cuba reload halaman. Saiz gambar yang disyorkan adalah bawah 5MB.' },

        ]
      },
      zh: {
        title: '支持',
        subtitle: '常见问题解答',
        contact_title: '联系我们',
        faqs: [
          { cat: '包裹系统', items: [
            { q: '无法以业主身份登录。', a: '确保单位号码正确（例如：10-5）。输入已注册的电子邮件或电话号码。如有问题，请联系管理员。' },

          ]},
          { cat: '访客系统', items: [
            { q: '访客已登记但无法进入。', a: '单位业主尚未批准。业主需登录 → 访客选项卡 → 批准。访客可使用参考码查询状态。', isNew: true },

          ]},
          { cat: '管理员 & 保安', items: [

      ta: {
        title: 'ஆதரவு',

        contact_title: 'எங்களை தொடர்பு கொள்ளுங்கள்',
        faqs: [
          { cat: 'பார்சல் அமைப்பு', items: [
            { q: 'யூனிட் உரிமையாளராக உள்நுழைய முடியவில்லை.', a: 'யூனிட் எண் சரியாக உள்ளதா என உறுதிப்படுத்தவும் (எ.கா: 10-5). பதிவு செய்த மின்னஞ்சல் அல்லது தொலைபேசி எண் உள்ளிடவும்.' },
            { q: 'பார்சல் புகைப்படம் பதிவேற்ற முடியவில்லை.', a: 'பிரௌசரில் கேமரா அணுகல் அனுமதிக்கப்பட்டுள்ளதா என சரிபார்க்கவும். 5MB க்கும் குறைவான படங்கள் பரிந்துரைக்கப்படுகின்றன.' },

          ]},
          { cat: 'பார்வையாளர் அமைப்பு', items: [
            { q: 'பார்வையாளர் பதிவு செய்தும் நுழைய முடியவில்லை.', a: 'யூனிட் உரிமையாளர் இன்னும் அனுமதிக்கவில்லை. உரிமையாளர் → பார்வையாளர் தாவல் → அனுமதி என்று செல்லவும்.', isNew: true },
            { q: 'Check In க்கு "Approved" தேவை என்று காவலர் சொல்கிறார்.', a: 'சரி. உரிமையாளர் முதலில் இணையத்தில் அனுமதிக்க வேண்டும். அனுமதித்த பிறகு காவலர் Check In கிளிக் செய்யலாம்.', isNew: true },
            { q: 'பதிவுக்குப் பிறகு QR கோடு கிடைக்கவில்லை.', a: 'பதிவு வெற்றியடைந்த பிறகு QR தானாக உருவாகும். Chrome அல்லது Safari பயன்படுத்தவும்.' },
            { q: 'QR கோடு தொலைந்தது, மீண்டும் பெற முடியுமா?', a: 'நிலை சரிபார்க்கும் பக்கம் சென்று குறிப்பு எண் உள்ளிடவும் (எ.கா: KES4X7MNP). இது QR மாற்றாக பயன்படும்.', isNew: true },
            { q: 'வாகன பதிவு எண் கட்டாயமா?', a: 'ஆம், பாதுகாப்பு மற்றும் பதிவு நோக்கங்களுக்காக வாகன பதிவு எண் கட்டாயமாகும்.', isNew: true },
          ]},
          { cat: 'நிர்வாகி & பாதுகாப்பு', items: [

            { q: 'நிர்வாகி இரண்டு அமைப்புகளையும் அணுகலாமா?', a: 'ஆம்! நிர்வாக டாஷ்போர்டில் இரண்டு தாவல்கள் உள்ளன — பார்சல் மற்றும் பார்வையாளர்.', isNew: true },

          ]},
          { cat: 'தொழில்நுட்பம் & பொது', items: [
            { q: 'தரவு எங்கே சேமிக்கப்படுகிறது?', a: 'சிங்கப்பூரில் உள்ள Supabase (PostgreSQL) இல் Row Level Security உடன் சேமிக்கப்படுகிறது. கடவுச்சொற்கள் சேமிக்கப்படுவதில்லை.' },
            { q: 'மொபைலில் பயன்படுத்தலாமா?', a: 'ஆம், முழுமையான மொபைல் ஆதரவு உள்ளது. PWA ஆக ஹோம் ஸ்க்ரீனில் சேர்க்கலாம்.' },
            { q: 'இந்த அமைப்பு இலவசமா?', a: 'Residensi Kesuma குடியிருப்பாளர்களுக்கு 100% இலவசம். Netlify மற்றும் Supabase இல் இயங்குகிறது.' },
          ]},
        ]
      }
    }

    const lang = getLang()
    const c = content[lang] || content.ms
    document.getElementById('txt-title').textContent = c.title
    document.getElementById('txt-subtitle').textContent = c.subtitle
    document.getElementById('txt-contact-title').textContent = c.contact_title

    const container = document.getElementById('faqContainer')
    c.faqs.forEach(group => {
      const catDiv = document.createElement('div')
      catDiv.className = 'cat-label'
      catDiv.textContent = group.cat
      container.appendChild(catDiv)
      group.items.forEach(faq => {
        const div = document.createElement('div')
        div.className = 'faq-item'
        div.innerHTML = `
          <div class="faq-q" onclick="toggleFaq(this)">
            <span>${faq.q}${faq.isNew ? '<span class="new-badge">NEW</span>' : ''}</span>
            <span class="faq-chevron">▼</span>
          </div>
          <div class="faq-a">${faq.a}</div>`
        container.appendChild(div)
      })
    })

    function toggleFaq(el) {
      const item = el.closest('.faq-item')
      const wasOpen = item.classList.contains('open')
      document.querySelectorAll('.faq-item').forEach(f => f.classList.remove('open'))
      if (!wasOpen) item.classList.add('open')
    }
  </script>
</body>
</html>
