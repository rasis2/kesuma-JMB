# Netlify configuration for Kesuma Parcel Hub
# Static site — no build step needed

[build]
  publish = "."

# Clean URLs — /dispatcher instead of /dispatcher.html
[[redirects]]
  from = "/dispatcher"
  to = "/dispatcher.html"
  status = 200

[[redirects]]
  from = "/owner"
  to = "/owner.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/how"
  to = "/how.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/plan"
  to = "/plan.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
