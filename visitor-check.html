<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semak Lawatan — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .status-card { border-radius:14px; padding:20px; margin-bottom:12px; border:1px solid var(--border); }
    .status-pending { border-color:rgba(var(--accent-rgb),0.3); background:var(--accent-dim); }
    .status-approved { border-color:rgba(76,175,125,0.3); background:var(--green-dim); }
    .status-rejected { border-color:rgba(224,92,92,0.3); background:var(--red-dim); }
    .status-checkedin { border-color:rgba(99,179,237,0.3); background:rgba(99,179,237,0.08); }
    .info-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--text-muted); }
    .info-val { font-weight:600; }
    .ref-box { background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.3); border-radius:10px; padding:12px 16px; text-align:center; margin-bottom:16px; }
    .ref-code { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); letter-spacing:3px; }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon green">🔍</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>

    <div class="section animate-in" style="animation-delay:0.05s">
      <div class="section-title" id="txt-sec-search"></div>
      <div class="field">
        <label id="txt-ref-label"></label>
        <input id="refInput" type="text" style="text-transform:uppercase;letter-spacing:2px;font-family:'JetBrains Mono',monospace" onkeydown="if(event.key==='Enter')checkVisitor()">
      </div>
      <button class="btn btn-gold" onclick="checkVisitor()" id="txt-check-btn"></button>
    </div>

    <div id="result"></div>
  </main>
  <div class="toast" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script>
    renderNav('vis_check_title')
    document.getElementById('txt-title').textContent = t('vis_check_title')
    document.getElementById('txt-subtitle').textContent = t('vis_check_subtitle')
    document.getElementById('txt-sec-search').textContent = t('vis_sec_search')
    document.getElementById('txt-ref-label').textContent = t('vis_ref_label')
    document.getElementById('refInput').placeholder = t('vis_ref_ph')
    document.getElementById('txt-check-btn').textContent = '🔍  ' + t('check')

    // auto uppercase
    document.getElementById('refInput').addEventListener('input', function() {
      this.value = this.value.toUpperCase()
    })

    function showToast(msg, type='') {
      const el = document.getElementById('toast')
      el.textContent = msg; el.className = `toast ${type} show`
      setTimeout(() => el.className = 'toast', 2800)
    }

    function fmtDate(ts) {
      if (!ts) return '—'
      return new Date(ts).toLocaleString('ms-MY', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
    }

    function statusClass(s) {
      if (s==='Approved') return 'status-approved'
      if (s==='Rejected') return 'status-rejected'
      if (s==='Checked In') return 'status-checkedin'
      return 'status-pending'
    }

    function statusEmoji(s) {
      if (s==='Approved') return '✅'
      if (s==='Rejected') return '❌'
      if (s==='Checked In') return '🟢'
      return '⏳'
    }

    async function checkVisitor() {
      const ref = document.getElementById('refInput').value.trim().toUpperCase()
      if (!ref) { showToast(t('vis_error_ref'), 'error-toast'); return }

      document.getElementById('result').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px">'+t('loading')+'</p>'

      try {
        const v = await apiCheckVisitor(ref)
        if (v.error) { document.getElementById('result').innerHTML = '<div class="section"><p style="color:var(--red);font-size:13px">'+v.error+'</p></div>'; return }

        const statusKey = { Pending:'vis_status_pending', Approved:'vis_status_approved', Rejected:'vis_status_rejected', 'Checked In':'vis_status_checkedin' }

        document.getElementById('result').innerHTML = `
          <div class="section animate-in ${statusClass(v.status)}">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <span style="font-size:28px">${statusEmoji(v.status)}</span>
              <div>
                <div style="font-family:var(--heading-font);font-size:16px;font-weight:800">${v.name}</div>
                <span class="badge-status ${v.status==='Approved'?'badge-done':v.status==='Rejected'?'badge-urgent':'badge-pending'}">${t(statusKey[v.status]||'vis_status_pending')}</span>
              </div>
            </div>
            <div class="ref-box"><div class="ref-code">${v.ref_code}</div></div>
            <div class="info-row"><span class="info-label">${t('vis_ic')}</span><span class="info-val">${v.ic_no}</span></div>
            <div class="info-row"><span class="info-label">${t('vis_phone')}</span><span class="info-val">${v.phone}</span></div>
            <div class="info-row"><span class="info-label">Unit</span><span class="info-val">${v.unit}</span></div>
            <div class="info-row"><span class="info-label">${t('vis_purpose')}</span><span class="info-val">${v.purpose}</span></div>
            <div class="info-row"><span class="info-label">${t('vis_registered')}</span><span class="info-val">${fmtDate(v.created_at)}</span></div>
            ${v.checked_in_at ? `<div class="info-row"><span class="info-label">${t('vis_checkin_time')}</span><span class="info-val">${fmtDate(v.checked_in_at)}</span></div>` : ''}
            ${v.checked_out_at ? `<div class="info-row"><span class="info-label">${t('vis_checkout_time')}</span><span class="info-val">${fmtDate(v.checked_out_at)}</span></div>` : ''}
          </div>`
      } catch(e) {
        document.getElementById('result').innerHTML = '<div class="section"><p style="color:var(--red);font-size:13px">'+t('error_server')+'</p></div>'
      }
    }
  </script>
</body>
</html>
